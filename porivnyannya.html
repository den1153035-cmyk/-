<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галерея — DragonRider</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Press+Start+2P&display=swap');
        
        :root { --red: #C8102E; --gold: #FFCC00; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #0a0a0a;
            color: #eee;
        }
        
        header {
            background: rgba(0,0,0,0.95);
            position: fixed;
            width: 100%;
            z-index: 1000;
            border-bottom: 3px solid var(--red);
        }
        
        nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo { font-family: 'Press Start 2P', cursive; font-size: 1.8rem; color: var(--gold); }
        
        .nav-links a {
            color: #eee;
            margin: 0 18px;
            text-decoration: none;
        }
        
        .nav-links a:hover { color: var(--gold); }
        
        .gallery-container {
            padding: 120px 5% 80px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            font-size: 3.5rem;
            margin-bottom: 3rem;
            color: var(--gold);
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 1.5rem;
        }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            border: 2px solid #333;
        }
        
        .gallery-item img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            transition: all 0.6s ease;
        }
        
        .gallery-item:hover img {
            transform: scale(1.12);
        }
        
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 1.5rem 1rem 1rem;
            transform: translateY(40px);
            transition: all 0.4s;
        }
        
        .gallery-item:hover .overlay {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">DRAGON<span style="color:#eee;">RIDER</span></div>
            <div class="nav-links">
                <a href="index.html">Головна</a>
                <a href="porivnyannya.html">Порівняння</a>
                <a href="gallery.html">Галерея</a>
            </div>
        </nav>
    </header>

    <div class="gallery-container">
        <h1>Галерея Китайських Мотоциклів</h1>
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="https://source.unsplash.com/random/800x600/?cfmoto,red" alt="CFMoto 450SS">
                <div class="overlay"><h3>CFMoto 450SS</h3><p>Спортивний фаворит</p></div>
            </div>
            <div class="gallery-item">
                <img src="https://source.unsplash.com/random/800x600/?cfmoto,blue" alt="CFMoto 675SS">
                <div class="overlay"><h3>CFMoto 675SS</h3><p>Потужний 3-циліндровий</p></div>
            </div>
            <div class="gallery-item">
                <img src="https://source.unsplash.com/random/800x600/?zongshen" alt="Zongshen RX4">
                <div class="overlay"><h3>Zongshen RX4</h3><p>Adventure для подорожей</p></div>
            </div>
            <div class="gallery-item">
                <img src="https://source.unsplash.com/random/800x600/?voge" alt="Voge 525DS">
                <div class="overlay"><h3>Voge 525DS</h3><p>Преміум adventure</p></div>
            </div>
            <div class="gallery-item">
                <img src="https://source.unsplash.com/random/800x600/?motorcycle,night" alt="Нічний мото">
                <div class="overlay"><h3>Нічний стиль</h3><p>CFMoto в місті</p></div>
            </div>
            <div class="gallery-item">
                <img src="https://source.unsplash.com/random/800x600/?adventure,motorcycle" alt="Adventure">
                <div class="overlay"><h3>Пригоди на дорозі</h3></div>
            </div>
        </div>
    </div>
</body>
</html>
